apiVersion: apps/v1
kind: Deployment
metadata:
  name: fleet-manager-deployment
spec:
  replicas: {{ .Values.replicaCount }} # Scaling to 3 shows high availability
  selector:
    matchLabels:
      app: fleet-manager
  template:
    metadata:
      labels:
        app: fleet-manager
    spec:
      containers:
        - name: fleet-manager-api
          image: fleet-manager:v1        # Matches your local Docker tag
          imagePullPolicy: Never        # Forces K8s to use your local build
          ports:
            - containerPort: 8080
          # Top-tier skill: Using Actuator for Self-Healing
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: fleet-manager-service
spec:
  type: NodePort
  selector:
    app: fleet-manager
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30080 # Accessible at http://localhost:30080
